<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="rpcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="eventGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="workflowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="settlementGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="batchGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrowYellow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="880" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700" letter-spacing="0.5">Card Payment Processing System</text>
  <text x="550" y="64" text-anchor="middle" fill="#94a3b8" font-size="13">Powered by Restate — Five paradigms, one system</text>

  <!-- Legend -->
  <g transform="translate(30, 82)">
    <rect x="0" y="0" width="1040" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="20" cy="14" r="5" fill="#3b82f6"/><text x="32" y="18" fill="#cbd5e1" font-size="10">Stateful RPC</text>
    <circle cx="145" cy="14" r="5" fill="#8b5cf6"/><text x="157" y="18" fill="#cbd5e1" font-size="10">Event-Driven Processing</text>
    <circle cx="325" cy="14" r="5" fill="#f59e0b"/><text x="337" y="18" fill="#cbd5e1" font-size="10">Per-Event Workflows</text>
    <circle cx="510" cy="14" r="5" fill="#10b981"/><text x="522" y="18" fill="#cbd5e1" font-size="10">Incremental Aggregation</text>
    <circle cx="700" cy="14" r="5" fill="#ef4444"/><text x="712" y="18" fill="#cbd5e1" font-size="10">Batch Processing</text>
    <circle cx="850" cy="14" r="5" fill="#06b6d4"/><text x="862" y="18" fill="#cbd5e1" font-size="10">Real-Time Serving</text>
  </g>

  <!-- Restate boundary -->
  <rect x="220" y="130" width="855" height="610" rx="12" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="240" y="150" fill="#475569" font-size="11" font-weight="600" letter-spacing="1">RESTATE</text>

  <!-- ════════════════════════════════════════ -->
  <!-- EXTERNAL ACTORS -->
  <!-- ════════════════════════════════════════ -->

  <!-- Merchant POS -->
  <g filter="url(#shadow)">
    <rect x="30" y="160" width="145" height="56" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <text x="103" y="183" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Merchant POS</text>
    <text x="103" y="200" text-anchor="middle" fill="#94a3b8" font-size="10">Auth request</text>
  </g>

  <!-- Card Network -->
  <g filter="url(#shadow)">
    <rect x="30" y="335" width="145" height="56" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <text x="103" y="358" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Card Network</text>
    <text x="103" y="375" text-anchor="middle" fill="#94a3b8" font-size="10">Clearing file</text>
  </g>

  <!-- EOD Trigger -->
  <g filter="url(#shadow)">
    <rect x="30" y="570" width="145" height="56" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <text x="103" y="593" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">EOD Trigger</text>
    <text x="103" y="610" text-anchor="middle" fill="#94a3b8" font-size="10">End of day</text>
  </g>

  <!-- Merchant Query -->
  <g filter="url(#shadow)">
    <rect x="740" y="780" width="160" height="56" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <text x="820" y="803" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Merchant</text>
    <text x="820" y="820" text-anchor="middle" fill="#94a3b8" font-size="10">Reconciliation query</text>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- ROW 1: PaymentAuth + Multi-Rail API -->
  <!-- ════════════════════════════════════════ -->

  <!-- PaymentAuth -->
  <g filter="url(#shadow)">
    <rect x="250" y="155" width="290" height="82" rx="10" fill="url(#rpcGrad)" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="260" y="162" width="270" height="28" rx="6" fill="url(#rpcGrad)"/>
    <text x="395" y="181" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">PaymentAuth</text>
    <text x="270" y="206" fill="#93c5fd" font-size="10" font-weight="600">Virtual Object</text>
    <text x="415" y="206" fill="#cbd5e1" font-size="10">keyed by authId</text>
    <text x="270" y="224" fill="#94a3b8" font-size="10">authorize() | getAuth() | onAuthReady()</text>
  </g>

  <!-- Multi-Rail API -->
  <g filter="url(#shadow)">
    <rect x="890" y="162" width="155" height="56" rx="8" fill="url(#externalGrad)" opacity="0.4" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="968" y="185" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Multi-Rail API</text>
    <text x="968" y="202" text-anchor="middle" fill="#94a3b8" font-size="10">External payment rail</text>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- ROW 2: ClearingGateway + ClearingWorkflow -->
  <!-- ════════════════════════════════════════ -->

  <!-- ClearingGateway -->
  <g filter="url(#shadow)">
    <rect x="250" y="320" width="290" height="82" rx="10" fill="url(#eventGrad)" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="260" y="327" width="270" height="28" rx="6" fill="url(#eventGrad)"/>
    <text x="395" y="346" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">ClearingGateway</text>
    <text x="270" y="370" fill="#c4b5fd" font-size="10" font-weight="600">Service (stateless)</text>
    <text x="270" y="388" fill="#94a3b8" font-size="10">ingest() — fans out via send()</text>
  </g>

  <!-- ClearingWorkflow -->
  <g filter="url(#shadow)">
    <rect x="620" y="290" width="430" height="170" rx="10" fill="url(#workflowGrad)" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="630" y="297" width="410" height="28" rx="6" fill="url(#workflowGrad)"/>
    <text x="835" y="316" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">ClearingWorkflow</text>
    <text x="640" y="342" fill="#fcd34d" font-size="10" font-weight="600">Workflow</text>
    <text x="720" y="342" fill="#cbd5e1" font-size="10">keyed by paymentId</text>

    <!-- Workflow steps -->
    <rect x="640" y="354" width="195" height="24" rx="5" fill="#292524" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
    <text x="650" y="370" fill="#fbbf24" font-size="10" font-weight="600">1</text>
    <text x="665" y="370" fill="#e2e8f0" font-size="10">Check auth (Awakeable)</text>

    <rect x="640" y="384" width="195" height="24" rx="5" fill="#292524" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
    <text x="650" y="400" fill="#fbbf24" font-size="10" font-weight="600">2</text>
    <text x="665" y="400" fill="#e2e8f0" font-size="10">Debit via ctx.run()</text>

    <rect x="845" y="354" width="195" height="24" rx="5" fill="#292524" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
    <text x="855" y="370" fill="#fbbf24" font-size="10" font-weight="600">3</text>
    <text x="870" y="370" fill="#e2e8f0" font-size="10">addPayment()</text>

    <rect x="845" y="384" width="195" height="24" rx="5" fill="#292524" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
    <text x="855" y="400" fill="#fbbf24" font-size="10" font-weight="600">4</text>
    <text x="870" y="400" fill="#e2e8f0" font-size="10">addMerchant()</text>

    <!-- Retry badge -->
    <rect x="640" y="418" width="190" height="24" rx="5" fill="#451a03" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="735" y="434" text-anchor="middle" fill="#fbbf24" font-size="9">~50% failure rate  →  auto retry</text>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- ROW 3: SettlementWindow + MerchantSettlement -->
  <!-- ════════════════════════════════════════ -->

  <!-- SettlementWindow -->
  <g filter="url(#shadow)">
    <rect x="250" y="555" width="290" height="82" rx="10" fill="url(#batchGrad)" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="260" y="562" width="270" height="28" rx="6" fill="url(#batchGrad)"/>
    <text x="395" y="581" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">SettlementWindow</text>
    <text x="270" y="605" fill="#fca5a5" font-size="10" font-weight="600">Virtual Object</text>
    <text x="395" y="605" fill="#cbd5e1" font-size="10">keyed by date</text>
    <text x="270" y="623" fill="#94a3b8" font-size="10">triggerSettlement() — DurableFuture.all()</text>
  </g>

  <!-- MerchantSettlement -->
  <g filter="url(#shadow)">
    <rect x="620" y="540" width="430" height="100" rx="10" fill="url(#settlementGrad)" opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
    <rect x="630" y="547" width="410" height="28" rx="6" fill="url(#settlementGrad)"/>
    <text x="835" y="566" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">MerchantSettlement</text>
    <text x="640" y="592" fill="#6ee7b7" font-size="10" font-weight="600">Virtual Object</text>
    <text x="770" y="592" fill="#cbd5e1" font-size="10">keyed by merchantId</text>
    <text x="640" y="610" fill="#94a3b8" font-size="10">addPayment() | settle() | getReconciliation()</text>
    <text x="640" y="628" fill="#6ee7b7" font-size="9">@Shared handler — concurrent reads, no locking</text>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- ARROWS -->
  <!-- ════════════════════════════════════════ -->

  <!-- 1. Merchant POS → PaymentAuth -->
  <line x1="175" y1="188" x2="248" y2="188" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="185" y="180" fill="#60a5fa" font-size="9" font-weight="600">authorize()</text>

  <!-- 2. Card Network → ClearingGateway -->
  <line x1="175" y1="363" x2="248" y2="361" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="185" y="355" fill="#a78bfa" font-size="9" font-weight="600">ingest()</text>

  <!-- 3. ClearingGateway → ClearingWorkflow (send / fire-and-forget) -->
  <line x1="540" y1="361" x2="618" y2="361" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <text x="552" y="353" fill="#a78bfa" font-size="9" font-weight="600">send() x N</text>
  <text x="552" y="378" fill="#7c3aed" font-size="8">fire-and-forget</text>

  <!-- 4. ClearingWorkflow → PaymentAuth (getAuth + Awakeable) -->
  <path d="M 620 310 C 580 310, 560 260, 540 240" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowYellow)"/>
  <text x="555" y="272" fill="#fbbf24" font-size="9" font-weight="600">getAuth()</text>
  <text x="555" y="284" fill="#d97706" font-size="8">+ Awakeable</text>

  <!-- 5. ClearingWorkflow → Multi-Rail API (debit) -->
  <path d="M 920 290 C 940 270, 955 240, 960 220" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGray)"/>
  <text x="942" y="260" fill="#94a3b8" font-size="9">ctx.run()</text>

  <!-- 6. ClearingWorkflow → MerchantSettlement (addPayment) -->
  <line x1="835" y1="462" x2="835" y2="538" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="843" y="505" fill="#34d399" font-size="9" font-weight="600">addPayment()</text>

  <!-- 7. ClearingWorkflow → SettlementWindow (addMerchant) -->
  <path d="M 620 445 C 580 480, 560 520, 540 553" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="556" y="500" fill="#f87171" font-size="9" font-weight="600">addMerchant()</text>

  <!-- 8. EOD Trigger → SettlementWindow -->
  <line x1="175" y1="598" x2="248" y2="596" stroke="#f87171" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="178" y="588" fill="#f87171" font-size="9" font-weight="600">triggerSettlement()</text>

  <!-- 9. SettlementWindow → MerchantSettlement (parallel settle) -->
  <line x1="540" y1="590" x2="618" y2="590" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="548" y="582" fill="#f87171" font-size="9" font-weight="600">settle() x N</text>
  <text x="548" y="607" fill="#dc2626" font-size="8">parallel futures</text>

  <!-- 10. MerchantSettlement → Multi-Rail API (credit during settle) -->
  <path d="M 1040 540 L 1055 540 C 1065 540, 1065 220, 1055 218 L 1047 218" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGray)"/>
  <text x="1060" y="390" fill="#94a3b8" font-size="8" transform="rotate(90, 1060, 390)">creditMerchant()</text>

  <!-- 11. Merchant → MerchantSettlement (query reconciliation) -->
  <line x1="820" y1="780" x2="820" y2="642" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="828" y="720" fill="#22d3ee" font-size="9" font-weight="600">getReconciliation()</text>
  <text x="828" y="732" fill="#0891b2" font-size="8">@Shared — concurrent</text>

  <!-- Paradigm footer -->
  <g transform="translate(30, 845)">
    <rect width="1040" height="28" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <text x="520" y="19" text-anchor="middle" fill="#64748b" font-size="11" letter-spacing="0.5">
      Stateful RPC  ·  Event-Driven Processing  ·  Per-Event Workflows  ·  Batch Processing  ·  Real-Time Serving
    </text>
  </g>

</svg>
